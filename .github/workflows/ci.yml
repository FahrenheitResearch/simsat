# Public CI: automatic for changes landing on or proposed to main, with manual
# dispatch retained for an owner-requested clean rerun.  Jobs have read-only
# repository access and require no fixtures, credentials, or release secrets.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-gate:
    name: fmt + clippy + test (Linux workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # The studio's Linux build needs winit/wayland/xkb headers. rfd uses the
      # xdg-portal backend, so GTK is not required.
      - name: Install Linux desktop build headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxkbcommon-dev libwayland-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      # Clippy already type-checks every root-workspace target, so a separate
      # Linux cargo-check job would only duplicate this compilation.
      - name: Lint the root workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Test the root workspace
        run: cargo test --workspace --locked

  engine-portability:
    name: Engine build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: Windows
          - os: macos-latest
            label: macOS
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # The engine library is the portable API surface. Studio packaging and
      # runtime GPU/UI checks remain deliberate manual release/QA steps.
      - name: Build the engine library
        run: cargo build --locked -p simsat --lib

  python-wheel-smoke:
    name: Python wheel + import + tiny render (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # This is the same abi3/manylinux distribution shape as the manual
      # release workflow, but it only verifies the wheel; it never publishes.
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: crates/simsat_py
          command: build
          args: --release --locked --out dist
          manylinux: auto

      - name: Install the built wheel
        run: python -m pip install crates/simsat_py/dist/simsat-*.whl

      - name: Import and render a generated tiny scene
        run: python .github/scripts/python-wheel-smoke.py
